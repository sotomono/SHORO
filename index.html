<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書路-SHORO-</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="layout">

        <!-- ===== サイドバー ===== -->
        <aside class="sidebar">
            <div class="site-title">
                <h1>書路<span class="site-title-roman">SHORO</span></h1>
                <p>最適な書き順を探索する</p>
            </div>

            <!-- Step 1: 入力 -->
            <div class="ctrl-block">
                <div class="step-header">
                    <div class="step-num">1</div>
                    <span class="step-title">文字を入力</span>
                </div>
                <p class="hint">お好きな漢字を1文字入力してください</p>
                <div class="ctrl-row">
                    <input type="text" id="kanjiInput" maxlength="1" placeholder="字">
                    <button id="loadKanjiBtn" class="btn primary flex1">読み込む</button>
                </div>
            </div>

            <!-- SVG（任意） -->
            <div class="ctrl-block optional">
                <div class="step-header">
                    <div class="step-num optional-num">＋</div>
                    <span class="step-title optional-title">SVGから読み込む（任意）</span>
                </div>
                <p class="hint">独自のSVGファイルを使う場合はこちら</p>
                <div class="ctrl-row">
                    <input type="file" id="fileInput" accept=".svg">
                    <label for="fileInput" class="btn full">SVGを選択</label>
                    <span id="fileName" class="file-name">未選択</span>
                </div>
            </div>

            <!-- Step 2: 速度 -->
            <div class="ctrl-block">
                <div class="step-header">
                    <div class="step-num">2</div>
                    <span class="step-title">速度を調整</span>
                </div>
                <p class="hint">アニメーションの再生速度を変えられます</p>
                <div class="ctrl-row speed-row">
                    <input type="range" id="speedRange" min="0.1" max="3.0" step="0.1" value="1.0">
                    <span class="speed-val"><span id="speedValue">1.0</span>x</span>
                </div>
            </div>

            <!-- Step 3: 再生 -->
            <div class="ctrl-block">
                <div class="step-header">
                    <div class="step-num">3</div>
                    <span class="step-title">再生</span>
                </div>
                <p class="hint">読み込み後に再生ボタンが有効になります</p>
                <div class="playback-controls">
                    <button id="playBtn" class="btn primary full" disabled>再生</button>
                    <button id="pauseBtn" class="btn half" disabled>一時停止</button>
                    <button id="resetBtn" class="btn half" disabled>最初から</button>
                </div>
            </div>

            <button id="shareBtn" class="btn share-btn">共有URLをコピー</button>
        </aside>

        <!-- ===== メインコンテンツ ===== -->
        <main class="main">
            <div class="comparison-view">
                <div class="view-panel">
                    <h2>元の書き順</h2>
                    <div id="originalContainer" class="canvas-container"></div>
                    <div id="originalStats" class="stats"></div>
                </div>
                <div class="view-panel">
                    <h2>最短書き順</h2>
                    <div id="shortestContainer" class="canvas-container"></div>
                    <div id="shortestStats" class="stats"></div>
                </div>
            </div>
        </main>

    </div>
    <script src="script.js"></script>
</body>

</html>
